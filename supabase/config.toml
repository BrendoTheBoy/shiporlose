# Supabase local / deploy config — extend with `supabase init` output as needed.
# create-checkout: gateway JWT verification off — we verify with service role + auth.getUser(jwt) in code.
# stripe-webhook: verified with STRIPE_WEBHOOK_SECRET; Stripe has no Supabase JWT.

[functions.create-checkout]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.resolve-projects]
verify_jwt = false

[functions.sync-commits]
verify_jwt = false
